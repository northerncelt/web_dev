# The name of the workflow
name: Node.js CI

# The events that trigger the workflow
on:
  push: # Trigger the workflow on push events
    branches: [ "main" ] # Only trigger on pushes to the main branch
  pull_request: # Trigger the workflow on pull request events
    branches: [ "main" ] # Only trigger on pull requests targeting the main branch

# The jobs that make up the workflow
jobs:
  build: # The name of the job
    runs-on: ubuntu-latest # The type of virtual environment to use (Ubuntu)

    strategy:
      matrix:
        node-version: [14, 16, 18] # Test against multiple Node.js versions

    steps: # The steps to run in the job
    - name: Checkout repository # Step to check out the repository
      uses: actions/checkout@v2 # Use the checkout action to clone the repository

    - name: Set up Node.js # Step to set up Node.js
      uses: actions/setup-node@v2 # Use the setup-node action to set up Node.js
      with:
        node-version: ${{ matrix.node-version }} # Use the Node.js version from the matrix

    - name: Install dependencies # Step to install dependencies
      run: npm install # Run the npm install command to install dependencies

    - name: Run tests # Step to run tests
      run: npm test # Run the npm test command to execute the test suite

    - name: Lint code # Step to lint the code
      run: npm run lint # Run the npm run lint command to lint the code