
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <!-- Circle patterns -->
    <pattern id="circles" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="25" fill="#007bff" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>
  <rect width="100%" height="100%" fill="url(#circles)"/>

  <!-- Color theory elements -->
  <circle cx="300" cy="150" r="80" fill="#FF0000" opacity="0.5" />
  <circle cx="350" cy="150" r="80" fill="#00FF00" opacity="0.5" />
  <circle cx="400" cy="150" r="80" fill="#0000FF" opacity="0.5" />
  
  <!-- Design elements -->
  <rect x="600" y="100" width="120" height="120" fill="#FFD700" opacity="0.3" />
  <rect x="650" y="80" width="120" height="120" fill="#4B0082" opacity="0.3" />
  <rect x="700" y="120" width="120" height="120" fill="#00CED1" opacity="0.3" />
  
  <!-- Abstract lines -->
  <line x1="900" y1="50" x2="1100" y2="250" stroke="#333" stroke-width="2" opacity="0.2" />
  <line x1="950" y1="50" x2="1150" y2="250" stroke="#333" stroke-width="2" opacity="0.2" />
  <line x1="1000" y1="50" x2="1200" y2="250" stroke="#333" stroke-width="2" opacity="0.2" />
</svg>